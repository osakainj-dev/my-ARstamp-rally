<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍀 Sky Parade Osaka</title>

    <!-- ✅ 安定版CDN: raw.githackをやめてjsdelivr/unpkgに統一 -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <!-- ✅ GPS AR用の正しいビルド (NFTではなくAR.js本体) -->
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>

    <!-- Google Fonts: Gaelic風フォント + 日本語対応 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green:   #009a49;
            --gold:    #f2b400;
            --white:   #f5f0e8;
            --dark:    #0d1a0f;
            --orange:  #ff6b1a;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Noto Sans JP', sans-serif;
            background: #000;
        }

        /* ===== OVERLAY ===== */
        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            overflow: hidden;
            background: var(--dark);
        }

        /* 背景: アイルランドのグラデーション空 */
        #overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 50% 80%, rgba(0,154,73,0.35) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 20% 20%, rgba(242,180,0,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 10%, rgba(255,107,26,0.12) 0%, transparent 60%),
                linear-gradient(185deg, #0d1a0f 0%, #0a2a15 40%, #071510 100%);
            z-index: 0;
        }

        /* 浮遊するシャムロック */
        .shamrocks {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .shamrock {
            position: absolute;
            font-size: clamp(1rem, 3vw, 2rem);
            animation: floatUp var(--dur, 8s) linear var(--delay, 0s) infinite;
            opacity: 0;
            will-change: transform, opacity;
        }
        @keyframes floatUp {
            0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.6; }
            80%  { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* コンテンツ */
        .overlay-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
        }

        .event-badge {
            display: inline-block;
            background: rgba(242,180,0,0.15);
            border: 1px solid rgba(242,180,0,0.4);
            border-radius: 100px;
            padding: 0.35em 1.2em;
            font-size: 0.75rem;
            color: var(--gold);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
            backdrop-filter: blur(8px);
        }

        .overlay-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            color: var(--white);
            line-height: 1.2;
            margin-bottom: 0.4rem;
            text-shadow: 0 0 40px rgba(0,154,73,0.6), 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: 0.02em;
        }

        .overlay-subtitle {
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            color: rgba(245,240,232,0.55);
            margin-bottom: 0.8rem;
            letter-spacing: 0.08em;
        }

        .overlay-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), var(--gold), var(--green), transparent);
            margin: 1.4rem auto;
            border-radius: 2px;
        }

        .overlay-desc {
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
            color: rgba(245,240,232,0.75);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .start-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 1rem 2.2rem;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--dark);
            background: linear-gradient(135deg, var(--gold) 0%, #f5c842 50%, var(--gold) 100%);
            border: none;
            border-radius: 100px;
            cursor: pointer;
            letter-spacing: 0.05em;
            box-shadow: 
                0 0 0 0 rgba(242,180,0,0.4),
                0 8px 32px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.3);
            animation: pulse 2.5s ease-in-out infinite;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .start-btn:active {
            transform: scale(0.96);
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(242,180,0,0.4), 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3); }
            50%       { box-shadow: 0 0 0 12px rgba(242,180,0,0), 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3); }
        }

        .hint {
            margin-top: 1.4rem;
            font-size: 0.75rem;
            color: rgba(245,240,232,0.35);
            letter-spacing: 0.05em;
        }

        /* ===== フィナーレ吹き出し ===== */
        #finale-msg {
            display: none;
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8888;
            background: rgba(10,30,14,0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,154,73,0.5);
            border-radius: 20px;
            padding: 1rem 1.8rem;
            text-align: center;
            color: var(--white);
            font-size: 0.9rem;
            max-width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(242,180,0,0.15);
            animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        #finale-msg .finale-emoji { font-size: 1.8rem; display: block; margin-bottom: 0.4rem; }
        #finale-msg .finale-text  { font-weight: 700; color: var(--gold); margin-bottom: 0.2rem; font-size: 1rem; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ===== ローディングバー ===== */
        #loading-bar {
            position: fixed;
            bottom: 0; left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--gold));
            z-index: 9998;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>

<!-- ローディングバー -->
<div id="loading-bar"></div>

<!-- ===== AR シーン ===== -->
<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; precision: mediump; logarithmicDepthBuffer: true;"
    loading-screen="dotsColor: #009a49; backgroundColor: #0d1a0f">

    <a-assets timeout="30000">
        <a-asset-item id="shark-model"   src="./whale_shark_fantasy.glb"></a-asset-item>
        <a-asset-item id="balloon-model" src="./peachy_balloon_gift-v1.glb"></a-asset-item>
        <a-asset-item id="trail-model"   src="./looping_particle_trail_fbx_0_9mb.glb"></a-asset-item>

        <!-- sparkle mixin: バルーンに合わせてサイズを絶対値で管理 -->
        <a-mixin id="sparkle-large"
            geometry="primitive: sphere; radius: 0.08"
            material="color: #00ff88; shader: flat; emissive: #00ff88; emissiveIntensity: 2.5; transparent: true; opacity: 0.9"
            animation__blink="property: scale; from: 0 0 0; to: 1 1 1; dur: 900; loop: true; dir: alternate; easing: easeInOutSine">
        </a-mixin>
        <a-mixin id="sparkle-gold"
            geometry="primitive: sphere; radius: 0.06"
            material="color: #f2b400; shader: flat; emissive: #f2b400; emissiveIntensity: 2; transparent: true; opacity: 0.85"
            animation__blink="property: scale; from: 0 0 0; to: 1 1 1; dur: 700; loop: true; dir: alternate; easing: easeInOutSine">
        </a-mixin>
    </a-assets>

    <!-- ===== シャーク: 位置・タイミングを統一 ===== -->
    <a-entity
        id="shark"
        gltf-model="#shark-model"
        scale="7 7 7"
        animation-mixer="clip: *; crossFadeDuration: 0.3; timeScale: 0.8"
        animation__move="property: position;
                         from: -12 28 -180;
                         to:   -12 28  400;
                         dur: 55000;
                         easing: linear;
                         loop: true;
                         autoplay: true"
        animation__bob="property: position;
                        from: -12 26 0;
                        to:   -12 30 0;
                        dur: 4000;
                        dir: alternate;
                        loop: true;
                        easing: easeInOutSine">
        <!-- 緑のspark -->
        <a-entity mixin="sparkle-large" position=" 1.2  0.5  0.2" animation__blink="delay: 0"></a-entity>
        <a-entity mixin="sparkle-large" position="-1.2 -0.5  0.8" animation__blink="delay: 250"></a-entity>
        <a-entity mixin="sparkle-large" position=" 0.5  1.2 -0.8" animation__blink="delay: 500"></a-entity>
        <a-entity mixin="sparkle-large" position="-0.5 -1.2 -0.4" animation__blink="delay: 750"></a-entity>
        <!-- 金のspark -->
        <a-entity mixin="sparkle-gold"  position=" 0.8  0.8  0.5" animation__blink="delay: 120"></a-entity>
        <a-entity mixin="sparkle-gold"  position="-0.8 -0.8 -0.5" animation__blink="delay: 370"></a-entity>
    </a-entity>

    <!-- ===== バルーン: sparkleをワールド座標に合わせてスケール補正 ===== -->
    <!--
        balloon scale: 0.03 → sparkle position は balloon local 座標
        balloon の 1ユニット = ワールド 0.03m
        ワールドで 2m 離したい → position 2/0.03 = 66.7
    -->
    <a-entity
        id="balloon"
        gltf-model="#balloon-model"
        scale="0.03 0.03 0.03"
        animation-mixer="clip: *; crossFadeDuration: 0.3"
        animation__move="property: position;
                         from: 12 22 -180;
                         to:   12 22  400;
                         dur: 55000;
                         easing: linear;
                         loop: true;
                         autoplay: true"
        animation__bob="property: position;
                        from: 12 20 0;
                        to:   12 24 0;
                        dur: 3200;
                        dir: alternate;
                        loop: true;
                        easing: easeInOutSine">

        <!-- sparkle: ローカル座標を balloon の逆スケール (1/0.03 ≈ 33) でオフセット -->
        <a-entity mixin="sparkle-large" scale="33 33 33" position="  0  2  0" animation__blink="delay: 0"></a-entity>
        <a-entity mixin="sparkle-gold"  scale="33 33 33" position=" 1.5 -1  1.5" animation__blink="delay: 200"></a-entity>
        <a-entity mixin="sparkle-large" scale="33 33 33" position="-1.5 -2 -1.5" animation__blink="delay: 400"></a-entity>
        <a-entity mixin="sparkle-gold"  scale="33 33 33" position="  1 -3.5  0" animation__blink="delay: 600"></a-entity>
        <a-entity mixin="sparkle-large" scale="33 33 33" position=" -1  3  1" animation__blink="delay: 800"></a-entity>

        <!--
          ===== パーティクルトレイル =====
          balloon scale="0.03" を打ち消すため scale="33.3 33.3 33.3"
          バルーンはZ+方向へ飛ぶ → 後方 = ローカルZ-
          ワールドで約6m後ろ → ローカル: 6/0.03 = 200ユニット
          rotation Y180でトレイルを進行方向に向ける
        -->
        <a-entity
            id="trail-green"
            gltf-model="#trail-model"
            scale="33.3 33.3 33.3"
            position="0 0 -200"
            rotation="0 180 0"
            animation-mixer="clip: Scene; loop: repeat; timeScale: 1.2">
        </a-entity>

        <!-- 金トレイル: 少し上・手前にオフセットして重ねる -->
        <a-entity
            id="trail-gold"
            gltf-model="#trail-model"
            scale="28 28 28"
            position="0 40 -160"
            rotation="0 180 15"
            animation-mixer="clip: Scene; loop: repeat; timeScale: 0.9">
        </a-entity>
    </a-entity>

    <!-- ✅ GPS ARカメラ設定 -->
    <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<!-- ===== OVERLAY ===== -->
<div id="overlay">
    <!-- 浮遊シャムロック -->
    <div class="shamrocks" id="shamrocks"></div>

    <div class="overlay-content">
        <div class="event-badge">☘ St. Patrick's Festival · Osaka 2025</div>

        <h1 class="overlay-title">Sky Parade</h1>
        <p class="overlay-subtitle">大阪×アイルランド 空のパレード</p>

        <div class="overlay-divider"></div>

        <p class="overlay-desc">
            イベントのフィナーレ🎉<br>
            空を見上げると、パレードが始まります。<br>
            カメラへのアクセスを許可してください。
        </p>

        <button class="start-btn" onclick="startExperience()">
            ☘️ パレードを始める
        </button>

        <p class="hint">📍 位置情報・カメラのアクセスが必要です</p>
    </div>
</div>

<!-- フィナーレメッセージ -->
<div id="finale-msg">
    <span class="finale-emoji">🎊</span>
    <div class="finale-text">Lá Fhéile Pádraig Sona Duit!</div>
    <div>ありがとう、大阪！また来年！🍀</div>
</div>

<script>
/* ===== シャムロックを生成 ===== */
(function() {
    const container = document.getElementById('shamrocks');
    const emojis = ['☘️','🍀','✨','💚','🌟'];
    for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'shamrock';
        el.textContent = emojis[i % emojis.length];
        el.style.setProperty('--dur',   (7 + Math.random() * 8) + 's');
        el.style.setProperty('--delay', (Math.random() * 10) + 's');
        el.style.left = (Math.random() * 100) + '%';
        container.appendChild(el);
    }
})();

/* ===== ローディングプログレス ===== */
(function() {
    const bar = document.getElementById('loading-bar');
    let prog = 0;
    const iv = setInterval(() => {
        prog = Math.min(prog + Math.random() * 12, 85);
        bar.style.width = prog + '%';
    }, 400);
    window.addEventListener('load', () => {
        clearInterval(iv);
        bar.style.width = '100%';
        setTimeout(() => { bar.style.opacity = '0'; }, 800);
    });
})();

/* ===== 不要パーツ非表示 & トレイルカラー適用 ===== */
window.addEventListener('load', function() {
    const scene = document.querySelector('a-scene');
    const HIDDEN_NODES = new Set(['particles_0','particles_1','particles_2','ocean_0']);

    // トレイルカラーマップ
    const TRAIL_TINTS = {
        'trail-green': { color: [0x00, 0xcc, 0x55], opacity: 0.85, emissive: 1.4 },
        'trail-gold':  { color: [0xf2, 0xb4, 0x00], opacity: 0.72, emissive: 1.1 },
    };

    scene.addEventListener('model-loaded', (e) => {
        const id = e.target.id;

        // 不要ノード非表示
        e.detail.model.traverse((node) => {
            if (HIDDEN_NODES.has(node.name.toLowerCase())) {
                node.visible = false;
            }
        });

        // トレイルの色・発光を上書き
        if (TRAIL_TINTS[id]) {
            const t = TRAIL_TINTS[id];
            const c = new THREE.Color(t.color[0]/255, t.color[1]/255, t.color[2]/255);
            e.detail.model.traverse((node) => {
                if (node.isMesh && node.material) {
                    const mats = Array.isArray(node.material) ? node.material : [node.material];
                    mats.forEach(mat => {
                        mat.color.set(c);
                        mat.emissive = c.clone();
                        mat.emissiveIntensity = t.emissive;
                        mat.transparent = true;
                        mat.opacity = t.opacity;
                        mat.depthWrite = false; // パーティクルの透明度を正しく描画
                        mat.needsUpdate = true;
                    });
                }
            });
        }

        console.log('[AR] モデル調整完了:', id);
    });
});

/* ===== スタート ===== */
function startExperience() {
    const overlay = document.getElementById('overlay');
    overlay.style.transition = 'opacity 0.6s ease';
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 650);

    // 45秒後にフィナーレメッセージ表示
    setTimeout(showFinale, 45000);
}

/* ===== フィナーレ ===== */
function showFinale() {
    const msg = document.getElementById('finale-msg');
    msg.style.display = 'block';
    setTimeout(() => {
        msg.style.transition = 'opacity 1s ease';
        msg.style.opacity = '0';
        setTimeout(() => { msg.style.display = 'none'; }, 1100);
    }, 8000);
}
</script>
</body>
</html>
