<script>
    // GPS判定距離（km）50m = 0.05
    const GPS_RADIUS_KM = 0.05;

    // =============================================
    // 営業時間判定（協賛店舗用）
    // close.h が 24以上の場合は翌日扱い（例: 25時 = 翌1時）
    // =============================================
    function isShopOpen(hours) {
        if (!hours) return null; // 営業時間データなし = 営業時間制限なし
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();
        const openMins  = hours.open.h  * 60 + hours.open.m;
        const closeMins = hours.close.h * 60 + hours.close.m;
        if (closeMins > 24 * 60) {
            // 深夜営業（翌日まで）: 0:00〜close%24:00 OR open〜24:00
            const closeWrapped = closeMins - 24 * 60;
            return nowMins >= openMins || nowMins < closeWrapped;
        }
        return nowMins >= openMins && nowMins < closeMins;
    }

    // スポットIDとサブインデックス（locations[idx]）から営業状態を返す
    // 戻り値: null=制限なし, true=営業中, false=営業時間外
    function getShopStatus(id, subIdx = null) {
        const t = targets[id];
        if (t.locations && subIdx !== null) {
            const loc = t.locations[subIdx];
            if (!loc.open) return null;
            return isShopOpen({ open: loc.open, close: loc.close });
        }
        if (t.shopHours) return isShopOpen(t.shopHours);
        return null;
    }

    // マーカーアイコンを返す
    // 取得済み: ☘️  営業中（未取得）: 🍺  営業時間外（未取得）: 🕐  通常: 📍
    function getMarkerIcon(id, subIdx, stamps) {
        if (stamps.includes(id)) return '☘️';
        const status = getShopStatus(id, subIdx);
        if (status === true)  return '🍺';
        if (status === false) return '🕐';
        return '📍';
    }

    // 全協賛店マーカーのアイコンを営業時間に合わせて更新
    function refreshShopMarkers() {
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        ['1', '2'].forEach(id => {
            if (!markers[id]) return;
            markers[id].forEach((m, idx) => {
                const icon = getMarkerIcon(id, id === '1' ? idx : null, stamps);
                m.setIcon(L.divIcon({className:'custom-marker', html:icon, iconSize:[30,30]}));
            });
        });
    }

    let map, markers = {}, userMarker = null;
    const storageKey = 'rally_v2026_final';
    const GOAL_ID = "13";
    const REQUIRED_COUNT = 7;
    let tapCount = 0;
    let currentLat, currentLng;

    function applyAdminOffsets() {
        const customCoords = JSON.parse(localStorage.getItem('admin_coords')) || {};
        for (let id in customCoords) {
            if (targets[id]) {
                if (customCoords[id].locations) targets[id].locations = customCoords[id].locations;
                else { targets[id].lat = customCoords[id].lat; targets[id].lng = customCoords[id].lng; }
            }
        }
    }

    function init() {
        applyAdminOffsets();
        const gridMain = document.getElementById('stamp-grid-main');
        const goalArea = document.getElementById('goal-area');
        const adminContainer = document.getElementById('admin-list-container');
        
        for (let i = 1; i <= 13; i++) {
            const id = String(i);
            const div = document.createElement('div');
            div.id = `stamp-${id}`;
            if (id === GOAL_ID) {
                div.className = 'stamp goal';
                div.innerHTML = `<span id="goal-name">🔒 7つのスタンプを集めて</span><div id="goal-btns" style="display:none;"><div class="btn-ui detail-btn" onclick="openModal('${id}')">🔍 解説</div><a href="#" class="btn-ui ar-btn" id="ar-link-${id}" target="_blank">☘️ AR</a></div>`;
                goalArea.appendChild(div);
            } else {
                div.className = `stamp stamp-color-${id}`;
                div.style.background = 'white'; // 未取得時は白
                div.innerHTML = `<span>${targets[id].name}</span><div class="btn-ui detail-btn" onclick="openModal('${id}')">🔍 解説</div><a href="#" id="ar-link-${id}" class="btn-ui ar-btn" target="_blank">☘️ AR</a>`;
                gridMain.appendChild(div);
            }

            const row = document.createElement('div');
            row.className = 'admin-row';
            row.innerHTML = `<div>[${id}] ${targets[id].name}</div>`;
            const group = document.createElement('div');
            group.className = 'admin-btn-group';

            if (id === "1") {
                ["A", "B", "C"].forEach((label, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'admin-btn';
                    btn.innerText = `登録-${label}`;
                    btn.onclick = () => saveLoc('1', idx);
                    group.appendChild(btn);
                });
            } else {
                const btn = document.createElement('button');
                btn.className = 'admin-btn';
                btn.innerText = `現在地を登録`;
                btn.onclick = () => saveLoc(id);
                group.appendChild(btn);
            }
            const acquireBtn = document.createElement('button');
            acquireBtn.className = 'admin-btn acquire-item-btn';
            acquireBtn.innerText = '取得済み';
            acquireBtn.onclick = () => acquireSingleStamp(id);
            group.appendChild(acquireBtn);

            const resetBtn = document.createElement('button');
            resetBtn.className = 'admin-btn reset-item-btn';
            resetBtn.innerText = '解除';
            resetBtn.onclick = () => resetSingleStamp(id);
            group.appendChild(resetBtn);
            row.appendChild(group);
            adminContainer.appendChild(row);
        }
        
        const center = targets["1"].locations[0];
        map = L.map('map').setView([center.lat, center.lng], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // マーカー配置も数字順で統一（ゴールは最初は地図に載せない）
        const stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        for (let i = 1; i <= 13; i++) {
            const id = String(i);
            markers[id] = [];
            if (id === GOAL_ID) continue; // ゴールは後でunlockされたときに追加
            const t = targets[id];
            const popupContent = `<strong>${t.name}</strong><br><button onclick="openModal('${id}')" style="margin-top:5px;font-size:10px;cursor:pointer;">解説を見る</button>`;
            
            if (t.locations) {
                t.locations.forEach((loc, idx) => {
                    const icon = getMarkerIcon(id, id === '1' ? idx : null, stamps);
                    const m = L.marker([loc.lat, loc.lng], {icon: L.divIcon({className:'custom-marker', html:icon, iconSize:[30,30]})}).addTo(map).bindPopup(popupContent);
                    markers[id].push(m);
                });
            } else {
                const icon = getMarkerIcon(id, null, stamps);
                const m = L.marker([t.lat, t.lng], {icon: L.divIcon({className:'custom-marker', html:icon, iconSize:[30,30]})}).addTo(map).bindPopup(popupContent);
                markers[id].push(m);
            }
        }
        updateDisplay();
        startGps();
        // 営業時間に応じてマーカーを1分ごとに自動更新
        setInterval(refreshShopMarkers, 60 * 1000);
    }

    function startGps() {
        const opt = { enableHighAccuracy: true, timeout: 10000, maximumAge: 3000 };
        navigator.geolocation.watchPosition(
            pos => {
                currentLat = pos.coords.latitude;
                currentLng = pos.coords.longitude;
                document.getElementById('current-gps-info').innerText = `現在地: ${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;

                // 現在地マーカーを更新（初回は作成、2回目以降は移動）
                if (userMarker) {
                    userMarker.setLatLng([currentLat, currentLng]);
                } else {
                    userMarker = L.marker([currentLat, currentLng], {
                        icon: L.divIcon({
                            className: 'custom-marker',
                            html: '📱',
                            iconSize: [30, 30]
                        }),
                        zIndexOffset: 1000
                    }).addTo(map).bindPopup('現在地');
                }
            },
            err => {
                document.getElementById('current-gps-info').innerText = `GPS取得失敗: ${err.message}`;
            },
            opt
        );
    }

    function checkLocation() {
        if (!currentLat) { alert("GPSを取得中です。少し待ってからもう一度お試しください。"); return; }
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        const mainCount = stamps.filter(id => id != GOAL_ID).length;
        let foundId = null;

        // 数字順で判定（for...inのランダム順バグを修正）
        for (let i = 1; i <= 13; i++) {
            const id = String(i);
            const t = targets[id];

            // locations（複数座標）の場合：最近接のサブスポットを特定
            let nearestSubIdx = null;
            let dist;
            if (t.locations) {
                let minDist = Infinity;
                t.locations.forEach((l, idx) => {
                    const d = getDist(currentLat, currentLng, l.lat, l.lng);
                    if (d < minDist) { minDist = d; nearestSubIdx = idx; }
                });
                dist = minDist;
            } else {
                dist = getDist(currentLat, currentLng, t.lat, t.lng);
            }

            if (dist < GPS_RADIUS_KM) {
                if (id == GOAL_ID && mainCount < REQUIRED_COUNT) {
                    alert("まだゴールは開いていません！"); return;
                }

                // 協賛店舗の営業時間チェック（取得済みの場合はスキップ）
                if (!stamps.includes(id)) {
                    const status = getShopStatus(id, nearestSubIdx);
                    if (status === false) {
                        const loc = t.locations ? t.locations[nearestSubIdx] : null;
                        const shopName = loc?.label || t.name.replace(/<[^>]+>/g, '');
                        const openHour = (loc?.open || t.shopHours?.open);
                        const openStr = openHour ? `${openHour.h}:${String(openHour.m).padStart(2,'0')}` : '';
                        alert(`🕐 現在 ${shopName} は営業時間外です。\n${openStr ? `営業開始：${openStr}〜` : ''}\n\nスタンプはお店が開いている時間にお越しください🍺`);
                        return;
                    }
                }

                foundId = id; break;
            }
        }

        if (foundId) {
            if (!stamps.includes(foundId)) {
                stamps.push(foundId);
                localStorage.setItem(storageKey, JSON.stringify(stamps));
                updateDisplay();
                alert("☘️ おめでとう！スタンプをゲット！");
            } else {
                alert("このスポットは獲得済みです！");
            }
        } else {
            alert("近くにスポットがありません。");
        }
    }

    function updateDisplay() {
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        const mainCount = stamps.filter(id => id != GOAL_ID).length;
        
        // 全スタンプをリセット（未取得→白背景）
        for (let i = 1; i <= 13; i++) {
            const el = document.getElementById("stamp-" + i);
            el?.classList.remove("active");
            if (el && i < 13) el.style.background = 'white';
            const ar = document.getElementById("ar-link-" + i);
            if (ar) ar.style.display = "none";
        }

        // 取得済みスタンプに虹色を適用
        stamps.forEach(id => {
            const el = document.getElementById("stamp-" + id);
            el?.classList.add("active");
            if (el && id != GOAL_ID) el.style.background = ''; // CSSクラスの色を有効化
            const ar = document.getElementById("ar-link-" + id);
            if (ar) { ar.href = targets[id].arUrl; ar.style.display = "block"; }
            // ゴール以外は取得済み☘️（協賛店含む）
            if (id != GOAL_ID) {
                markers[id].forEach(m => m.setIcon(L.divIcon({className:'custom-marker', html:'☘️', iconSize:[30,30]})));
            } else {
                markers[id].forEach(m => m.setIcon(L.divIcon({className:'custom-marker', html:'🌈', iconSize:[30,30]})));
            }
        });

        // 未取得の協賛店マーカーを営業時間で更新
        refreshShopMarkers();

        const wasLocked = markers[GOAL_ID].length === 0;
        if (mainCount >= REQUIRED_COUNT) {
            const goalEl = document.getElementById("stamp-" + GOAL_ID);
            goalEl.classList.add("ready");
            document.getElementById("goal-name").innerHTML = targets[GOAL_ID].name;
            document.getElementById("goal-btns").style.display = "flex";

            // ゴールマーカーをまだ追加していなければ追加
            if (markers[GOAL_ID].length === 0) {
                const t = targets[GOAL_ID];
                const popupContent = `<strong>${t.name}</strong><br><button onclick="openModal('${GOAL_ID}')" style="margin-top:5px;font-size:10px;cursor:pointer;">解説を見る</button>`;
                const icon = stamps.includes(GOAL_ID) ? '🌈' : '📍';
                const m = L.marker([t.lat, t.lng], {icon: L.divIcon({className:'custom-marker', html:icon, iconSize:[30,30]})}).addTo(map).bindPopup(popupContent);
                markers[GOAL_ID].push(m);

                // 初めて解放された瞬間だけモーダルで通知
                if (wasLocked) {
                    setTimeout(() => {
                        showGoalUnlockModal();
                    }, 300);
                }
            }

            // ゴール取得済みならノベルティスライドを表示
            if (stamps.includes(GOAL_ID)) {
                const noveltyArea = document.getElementById('novelty-area');
                if (noveltyArea.style.display === 'none') {
                    noveltyArea.style.display = 'block';
                    initNoveltySlider();
                }
            } else if (!stamps.includes(GOAL_ID)) {
                markers[GOAL_ID].forEach(m => m.setIcon(L.divIcon({className:'custom-marker', html:'📍', iconSize:[30,30]})));
            }
        } else {
            document.getElementById("stamp-" + GOAL_ID).classList.remove("ready");
            document.getElementById("goal-name").innerHTML = `🔒 <span style="font-size:10px; color:#999;">難波エリアのどこか…</span>`;
            document.getElementById("goal-btns").style.display = "none";
            // ゴールマーカーを地図から削除
            markers[GOAL_ID].forEach(m => map.removeLayer(m));
            markers[GOAL_ID] = [];
        }
        document.getElementById("status").innerText = `集めたスタンプ: ${mainCount} / ${REQUIRED_COUNT}`;
    }

    function saveLoc(id, idx = null) {
        if (!currentLat) return;
        const c = JSON.parse(localStorage.getItem('admin_coords')) || {};
        if (idx !== null) {
            if (!c[id]) c[id] = { locations: [...targets[id].locations] };
            c[id].locations[idx] = { lat: currentLat, lng: currentLng };
        } else {
            c[id] = { lat: currentLat, lng: currentLng };
        }
        localStorage.setItem('admin_coords', JSON.stringify(c));
        alert(`${targets[id].name} を現在の座標で登録しました。画面を更新して反映してください。`);
    }

    function acquireSingleStamp(id) {
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        if (!stamps.includes(id)) {
            stamps.push(id);
            localStorage.setItem(storageKey, JSON.stringify(stamps));
            updateDisplay();
            alert(targets[id].name + ' を取得済みにしました。');
        } else {
            alert('すでに取得済みです。');
        }
    }

    function resetSingleStamp(id) {
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        const index = stamps.indexOf(id);
        if (index > -1) {
            stamps.splice(index, 1);
            localStorage.setItem(storageKey, JSON.stringify(stamps));
            updateDisplay();
            alert(`${targets[id].name} の獲得状況をリセットしました。`);
        }
    }

    function exportSettings() {
        applyAdminOffsets();
        const area = document.getElementById('export-area');
        area.style.display = 'block';
        area.value = JSON.stringify(targets, null, 4);
        area.select();
        navigator.clipboard.writeText(area.value).catch(() => document.execCommand('copy'));
        alert("設定をクリップボードにコピーしました。");
    }

    function adminTrigger() { if (++tapCount >= 5) { document.getElementById('admin-panel').style.display = 'block'; tapCount = 0; } }
    function resetAdminCoords() { if (confirm("全て初期化しますか？")) { localStorage.clear(); location.reload(); } }

    let currentModalId = null;

    function openModal(id) {
        currentModalId = id;
        document.getElementById('modalTitle').innerHTML = targets[id].name;
        document.getElementById('modalImg').src = targets[id].imgUrl;
        document.getElementById('modalImgIreland').src = targets[id].imgIreland || '';
        const hasIreland = targets[id].imgIreland && targets[id].imgIreland !== "";
        document.getElementById('modal-tabs').style.display = hasIreland ? 'flex' : 'none';
        switchTab('local');
        document.getElementById('infoModal').style.display = 'flex';
    }

    function switchTab(tab) {
        const isLocal = tab === 'local';
        const t = currentModalId ? targets[currentModalId] : null;

        // 画像切り替え
        document.getElementById('modalImg').style.display        = isLocal ? 'block' : 'none';
        document.getElementById('modalImgIreland').style.display = isLocal ? 'none'  : 'block';

        // 本文切り替え（descriptionIrelandがあれば使う、なければdescriptionを流用）
        if (t) {
            const body = !isLocal && t.descriptionIreland
                ? t.descriptionIreland
                : t.description;
            document.getElementById('modalBody').innerHTML = body;
        }

        document.getElementById('tab-local').classList.toggle('active',  isLocal);
        document.getElementById('tab-ireland').classList.toggle('active', !isLocal);
    }

    function closeModal() {
        document.getElementById('infoModal').style.display = 'none';
        // モーダル画像を元に戻す
        document.getElementById('modalImg').style.display = 'block';
    }

    function getDist(lat1,lng1,lat2,lng2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
    // ノベルティスライドボタン
    // 汎用スライダー初期化（thumbId, wrapId, doneId, storageKeySuffix）
    function initSlider(thumbId, wrapId, doneId, keySuffix) {
        const thumb = document.getElementById(thumbId);
        const wrap  = document.getElementById(wrapId);
        const done  = document.getElementById(doneId);
        if (!thumb || !wrap) return;

        const key = storageKey + keySuffix;
        if (localStorage.getItem(key) === 'done') {
            wrap.style.display = 'none';
            done.style.display = 'block';
            return;
        }

        let startX = 0, isDragging = false;
        const maxSlide = () => wrap.offsetWidth - 44 - 8;

        const onStart = (e) => {
            isDragging = true;
            startX = (e.touches ? e.touches[0].clientX : e.clientX) - parseInt(thumb.style.left || 4);
            thumb.style.cursor = 'grabbing';
        };
        const onMove = (e) => {
            if (!isDragging) return;
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
            thumb.style.left = Math.max(4, Math.min(x, maxSlide())) + 'px';
        };
        const onEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            thumb.style.cursor = 'grab';
            if (parseInt(thumb.style.left) >= maxSlide() - 10) {
                localStorage.setItem(key, 'done');
                wrap.style.display = 'none';
                done.style.display = 'block';
            } else {
                thumb.style.left = '4px';
            }
        };

        thumb.addEventListener('mousedown', onStart);
        thumb.addEventListener('touchstart', onStart, {passive: true});
        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, {passive: true});
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchend', onEnd);
    }

    function initNoveltySlider() {
        initSlider('postcard-thumb', 'postcard-slide-wrap', 'postcard-done', '_postcard');
        initSlider('sticker-thumb',  'sticker-slide-wrap',  'sticker-done',  '_sticker');
    }

    window.onload = init;
