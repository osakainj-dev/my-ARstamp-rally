<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>St. Patrick's Stamp Rally</title>
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --irish-green: #009a49;
            --gold: #ffcd00;
            --dark-green: #00622d;
            --cream: #f8f4e3;
            --parchment: #fdf5e6;
        }

        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: var(--cream); color: var(--dark-green); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border: 4px double var(--gold); border-radius: 15px; padding: 15px; box-sizing: border-box; }

        .title-image-container { text-align: center; margin-bottom: 15px; width: 100%; }
        .title-image { width: 100%; height: auto; max-width: 450px; display: block; margin: 0 auto; border-radius: 10px; cursor: pointer; }

        #map { height: 250px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid var(--irish-green); }
        .check-btn { width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; background: var(--irish-green); color: white; border: none; border-radius: 50px; box-shadow: 0 4px 0 var(--dark-green); margin-bottom: 20px; }
        
        .stamp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stamp { background: #fff; border: 1.5px dashed var(--irish-green); border-radius: 8px; padding: 8px 2px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 125px; box-sizing: border-box; font-size: 12px; }
        .stamp.goal { width: 75%; border: 3px double #ccc; background: #eee; min-height: 140px; color: #999; margin: 0 auto; }
        .stamp.goal.ready { border-color: var(--gold); background: #fffdf0; color: var(--dark-green); }
        .goal-container { margin-top: 10px; text-align: center; }
        
        .btn-ui { display: block; width: 90%; padding: 6px 0; margin: 2px 0; border-radius: 4px; font-size: 10px; font-weight: bold; text-decoration: none; text-align: center; cursor: pointer; }
        .detail-btn { background: white; color: var(--dark-green); border: 1px solid var(--gold); }
        .ar-btn { background: var(--irish-green); color: white; border: none; display: none; }
        
        .stamp.active { border-style: solid; background: #e8f5e9; }
        .stamp.active::before { content: '☘️'; font-size: 16px; }
        .stamp.goal.active::before { content: '🌈'; font-size: 22px; }

        /* 管理者パネルのスタイル */
        #admin-panel { display: none; background: #333; color: white; padding: 15px; margin-top: 20px; border-radius: 10px; font-size: 12px; }
        .admin-ctrl { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .admin-btn { padding: 8px; background: #555; border: 1px solid #777; color: white; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .admin-btn.danger { background: #a22; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background-color: var(--parchment); width: 85%; max-width: 400px; padding: 20px; border-radius: 5px; border: 8px double var(--gold); position: relative; max-height: 85vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 5px; right: 10px; font-size: 24px; cursor: pointer; }
        .modal-image { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; border: 2px solid var(--gold); margin: 10px 0; }
        #status { text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .custom-marker { font-size: 26px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="title-image-container">
        <img src="./logo.png" alt="Shamrock Rally Logo" class="title-image" id="logo-img" onclick="adminTrigger()">
    </div>

    <div class="intro-text" style="text-align: center; padding: 10px; font-size: 0.9rem; line-height: 1.5; color: var(--dark-green);">
        <p style="margin: 0; font-weight: bold;">街を巡ってARスタンプを集めよう！</p>
        <p style="margin: 5px 0 0 0;">知恵をコンプリートして、<br>虹の麓に隠されたゴールを目指せ！☘️</p>
    </div>
    
    <div id="map"></div>
    <div id="status">読み込み中...</div>
    <button class="check-btn" onclick="checkLocation()">現在地でスタンプ！</button>

    <div class="stamp-grid" id="stamp-grid-main"></div>
    <div class="goal-container" id="goal-area"></div>

    <div id="admin-panel">
        <strong>🔧 現場座標調整モード</strong><br>
        <span id="current-gps-info">GPS取得中...</span>
        <div class="admin-ctrl" id="admin-buttons"></div>
        <button class="admin-btn danger" style="width:100%; margin-top:10px;" onclick="resetAdminCoords()">調整をすべてリセット</button>
        <p style="font-size: 9px; color: #ccc; margin-top: 10px;">※ここで設定した座標は、このブラウザのみに保存されます。テスト完了後、表示される数値をソースコードに反映してください。</p>
    </div>
</div>

<div id="infoModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" class="modal-title"></h2>
        <img id="modalImg" class="modal-image" src="" alt="">
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script>
    // 元のターゲットデータ
    const targets = {
        "1": { name: "三つ葉の広場", lat: 35.7725, lng: 139.6615, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1590076215667-873d3253503a?w=500", description: "<b>【シャムロック】</b><br>三つ葉のクローバーはアイルランドの国花。" },
        "2": { name: "妖精の靴屋", lat: 35.6812, lng: 139.7671, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1599839619722-397514112634?w=500", description: "<b>【レプラコーン】</b><br>靴を直す妖精。" },
        "3": { name: "ダブリンの扉", lat: 35.6924, lng: 139.6971, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1582234032482-628d7a868430?w=500", description: "<b>【カラフルなドア】</b>" },
        "4": { name: "吟遊詩人の竪琴", lat: 35.7000, lng: 139.7000, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1595066601614-747f48037b52?w=500", description: "<b>【ハープ】</b>" },
        "5": { name: "巨人の道", lat: 35.7100, lng: 139.7100, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1547432041-319985223030?w=500", description: "<b>【ジャイアンツ・コーズウェー】</b>" },
        "6": { name: "ケルトの結び目", lat: 35.7200, lng: 139.7200, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1621236304191-382500028400?w=500", description: "<b>【永遠のシンボル】</b>" },
        "7": { name: "羊の住む丘", lat: 35.7300, lng: 139.7300, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1484557985045-edf25e08da73?w=500", description: "<b>【アランセーター】</b>" },
        "8": { name: "スロンチャ！の鐘", lat: 35.7400, lng: 139.7400, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1559526323-cb2f2fe2591b?w=500", description: "<b>【Sláinte】</b>乾杯！" },
        "9": { name: "守護聖人の書", lat: 35.7500, lng: 139.7500, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=500", description: "<b>【ケルズの書】</b>" },
        "10": { name: "聖なる泉", lat: 35.7600, lng: 139.7600, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1518005020951-ecc84916723f?w=500", description: "<b>【聖なる泉】</b>" },
        "11": { name: "緑の谷", lat: 35.7700, lng: 139.7700, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1518005020951-ecc84916723f?w=500", description: "<b>【緑の谷】</b>" },
        "12": { name: "風の砦", lat: 35.7800, lng: 139.7800, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1518005020951-ecc84916723f?w=500", description: "<b>【風の砦】</b>" },
        "13": { name: "🌈 虹の麓の黄金", lat: 35.7600, lng: 139.7600, arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2", imgUrl: "https://images.unsplash.com/photo-1518005020951-ecc84916723f?w=500", description: "<b>【コンプリート！】</b>" }
    };

    let map, markers = {};
    const storageKey = 'rally_locked_final_v13'; 
    const GOAL_ID = "13"; 
    const REQUIRED_COUNT = 9; 
    let tapCount = 0;

    function applyAdminOffsets() {
        const customCoords = JSON.parse(localStorage.getItem('admin_coords')) || {};
        for (let id in customCoords) {
            if (targets[id]) {
                targets[id].lat = customCoords[id].lat;
                targets[id].lng = customCoords[id].lng;
            }
        }
    }

    function init() {
        applyAdminOffsets();
        const gridMain = document.getElementById('stamp-grid-main');
        const goalArea = document.getElementById('goal-area');
        const adminBtnContainer = document.getElementById('admin-buttons');
        
        for (let i = 1; i <= 13; i++) {
            const id = String(i);
            const div = document.createElement('div');
            div.id = `stamp-${id}`;
            
            if (id === GOAL_ID) {
                div.className = 'stamp goal';
                div.innerHTML = `<span id="goal-name">🔒 ${REQUIRED_COUNT}個集めて解放</span><div id="goal-btns" style="display:none;"><div class="btn-ui detail-btn" onclick="openModal('${id}')">🔍 解説</div><a href="#" class="btn-ui ar-btn" id="ar-link-${id}" target="_blank">☘️ AR</a></div>`;
                goalArea.appendChild(div);
            } else {
                div.className = 'stamp';
                div.innerHTML = `<span>${targets[id].name}</span><div class="btn-ui detail-btn" onclick="openModal('${id}')">🔍 解説</div><a href="#" id="ar-link-${id}" class="btn-ui ar-btn" target="_blank">☘️ AR</a>`;
                gridMain.appendChild(div);
            }

            // 管理者用ボタンの生成
            const abtn = document.createElement('button');
            abtn.className = 'admin-btn';
            abtn.innerText = `[${id}]を現在地に設定`;
            abtn.onclick = () => saveCurrentLocationAsTarget(id);
            adminBtnContainer.appendChild(abtn);
        }
        
        map = L.map('map').setView([targets["1"].lat, targets["1"].lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        for (let id in targets) {
            markers[id] = L.marker([targets[id].lat, targets[id].lng], {
                icon: L.divIcon({ className:'custom-marker', html:(id==GOAL_ID ? '🔒' : '📍'), iconSize:[30,30] })
            }).addTo(map).bindPopup(id==GOAL_ID ? `${REQUIRED_COUNT}個集めると解放！` : targets[id].name);
        }
        updateDisplay();
        startGpsTracking();
    }

    function updateDisplay() {
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        const mainCount = stamps.filter(id => id != GOAL_ID).length;
        
        stamps.forEach(id => {
            const el = document.getElementById("stamp-" + id);
            if(el) el.classList.add("active");
            const arLnk = document.getElementById("ar-link-" + id);
            if (arLnk) { arLnk.href = targets[id].arUrl; arLnk.style.display = "block"; }
            if(id != GOAL_ID) markers[id].setIcon(L.divIcon({ className:'custom-marker', html:'☘️', iconSize:[30,30] }));
        });

        const goalEl = document.getElementById("stamp-" + GOAL_ID);
        if (mainCount >= REQUIRED_COUNT) {
            goalEl.classList.add("ready");
            document.getElementById("goal-name").innerText = targets[GOAL_ID].name;
            document.getElementById("goal-btns").style.display = "block"; 
            markers[GOAL_ID].setIcon(L.divIcon({ className:'custom-marker', html:'🚩', iconSize:[30,30] }));
        }
        if (stamps.includes(GOAL_ID)) {
            goalEl.classList.add("active");
            markers[GOAL_ID].setIcon(L.divIcon({ className:'custom-marker', html:'🌈', iconSize:[30,30] }));
        }
        document.getElementById("status").innerText = `集めたスタンプ: ${mainCount} / ${REQUIRED_COUNT}`;
    }

    function checkLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
            const mainCount = stamps.filter(id => id != GOAL_ID).length;
            let foundId = null;
            for (let id in targets) {
                const dist = getDistance(latitude, longitude, targets[id].lat, targets[id].lng);
                if (dist < 0.05) { // 50メートル以内
                    if (id == GOAL_ID && mainCount < REQUIRED_COUNT) { alert("まだゴールは開いていません！"); return; }
                    foundId = id; break;
                }
            }
            if (foundId) { saveStamp(foundId); updateDisplay(); alert("☘️ スタンプゲット！"); }
            else alert("近くにスポットがありません。");
        }, err => alert("位置情報が許可されていません"), {enableHighAccuracy: true});
    }

    // --- 管理者用機能 ---
    function adminTrigger() {
        tapCount++;
        if (tapCount >= 5) {
            document.getElementById('admin-panel').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
            alert("🔧 管理者モード：各スポットの座標を現在地に上書きできます。");
            tapCount = 0;
        }
    }

    let currentLat, currentLng;
    function startGpsTracking() {
        navigator.geolocation.watchPosition(pos => {
            currentLat = pos.coords.latitude;
            currentLng = pos.coords.longitude;
            document.getElementById('current-gps-info').innerText = `現在地: ${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
        }, null, {enableHighAccuracy: true});
    }

    function saveCurrentLocationAsTarget(id) {
        if (!currentLat) { alert("GPS取得中..."); return; }
        const customCoords = JSON.parse(localStorage.getItem('admin_coords')) || {};
        customCoords[id] = { lat: currentLat, lng: currentLng };
        localStorage.setItem('admin_coords', JSON.stringify(customCoords));
        
        // データを即時反映
        targets[id].lat = currentLat;
        targets[id].lng = currentLng;
        markers[id].setLatLng([currentLat, currentLng]);
        map.panTo([currentLat, currentLng]);
        
        alert(`スポット[${id}] を現在の場所に設定しました。\n${currentLat}, ${currentLng}`);
    }

    function resetAdminCoords() {
        if (confirm("すべての座標調整をリセットしますか？")) {
            localStorage.removeItem('admin_coords');
            location.reload();
        }
    }

    // --- ユーティリティ ---
    function openModal(id) {
        document.getElementById('modalTitle').innerText = targets[id].name;
        document.getElementById('modalImg').src = targets[id].imgUrl;
        document.getElementById('modalBody').innerHTML = targets[id].description;
        document.getElementById('infoModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
    function getDistance(lat1,lng1,lat2,lng2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
    function saveStamp(id){let stamps=JSON.parse(localStorage.getItem(storageKey))||[];if(!stamps.includes(id)){stamps.push(id);localStorage.setItem(storageKey,JSON.stringify(stamps));}}
    window.onload = init;
</script>
</body>
</html>
