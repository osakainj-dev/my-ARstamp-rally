<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>St. Patrick's Stamp Rally</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --irish-green: #009a49;
            --gold: #ffcd00;
            --dark-green: #00622d;
            --cream: #f8f4e3;
            --parchment: #fdf5e6;
        }

        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: var(--cream); color: var(--dark-green); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border: 4px double var(--gold); border-radius: 15px; padding: 15px; box-sizing: border-box; position: relative; }

        .title-image-container { text-align: center; margin-bottom: 10px; width: 100%; }
        .title-image { width: 100%; height: auto; max-width: 450px; display: block; margin: 0 auto; border-radius: 10px; cursor: pointer; }

        .guide-link-container { text-align: center; margin-bottom: 15px; }
        .guide-btn { display: inline-block; padding: 8px 20px; background: white; color: var(--irish-green); border: 2px solid var(--irish-green); border-radius: 20px; font-weight: bold; text-decoration: none; font-size: 0.85rem; }

        #map { height: 250px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid var(--irish-green); background: #eee; z-index: 1; }
        .check-btn { width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; background: var(--irish-green); color: white; border: none; border-radius: 50px; box-shadow: 0 4px 0 var(--dark-green); margin-bottom: 20px; }
        
        .refresh-ui-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: white; border: 2px solid var(--gold); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 9999; cursor: pointer; }

        .stamp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stamp { background: #fff; border: 1.5px dashed var(--irish-green); border-radius: 8px; padding: 8px 2px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 125px; box-sizing: border-box; font-size: 11px; position: relative; }
        .stamp.goal { width: 75%; border: 3px double #ccc; background: #eee; min-height: 160px; color: #999; margin: 0 auto; grid-column: 1 / span 3; justify-content: center; gap: 6px; }
        .stamp.goal.ready { border-color: var(--gold); background: #fffdf0; color: var(--dark-green); }
        .goal-container { margin-top: 10px; text-align: center; }
        
        .btn-ui { display: block; width: 90%; padding: 6px 0; margin: 2px 0; border-radius: 4px; font-size: 10px; font-weight: bold; text-decoration: none; text-align: center; cursor: pointer; }
        .detail-btn { background: white; color: var(--dark-green); border: 1px solid var(--gold); }
        .ar-btn { background: var(--irish-green); color: white; border: none; display: none; }
        
        .stamp.active { border-style: solid; }
        .stamp.active::before { content: '☘️'; font-size: 16px; }
        .stamp.goal.active::before { content: '🌈'; font-size: 22px; }

        /* 虹グラデーション（3列×4行、1〜12番） */
        .stamp-color-1  { background: #fff0f0; } /* 赤 */
        .stamp-color-2  { background: #fff4f0; }
        .stamp-color-3  { background: #fff8f0; } /* オレンジ */
        .stamp-color-4  { background: #fffbf0; }
        .stamp-color-5  { background: #fffff0; } /* 黄 */
        .stamp-color-6  { background: #f8fff0; }
        .stamp-color-7  { background: #f0fff0; } /* 黄緑 */
        .stamp-color-8  { background: #f0fff4; }
        .stamp-color-9  { background: #f0fff8; } /* 緑 */
        .stamp-color-10 { background: #f0f8ff; } /* 水色 */
        .stamp-color-11 { background: #f0f0ff; } /* 青 */
        .stamp-color-12 { background: #f8f0ff; } /* 紫 */

        #admin-panel { display: none; background: #333; color: white; padding: 15px; margin-top: 20px; border-radius: 10px; font-size: 12px; }
        .admin-row { border-bottom: 1px dotted #666; padding: 10px 0; display: flex; flex-direction: column; gap: 5px; }
        .admin-btn-group { display: flex; gap: 5px; }
        .admin-btn { padding: 8px; background: #555; border: 1px solid #777; color: white; border-radius: 4px; font-size: 9px; cursor: pointer; flex: 1; }
        .reset-item-btn { background: #a55; border-color: #f77; max-width: 60px; }
        .acquire-item-btn { background: #2a7; border-color: #4d9; max-width: 60px; }
        .export-area { width: 100%; height: 100px; margin-top: 10px; background: #000; color: #0f0; font-family: monospace; font-size: 10px; display: none; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background-color: var(--parchment); width: 85%; max-width: 400px; padding: 20px; border-radius: 5px; border: 8px double var(--gold); position: relative; max-height: 85vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 5px; right: 10px; font-size: 24px; cursor: pointer; }
        .modal-image { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; border: 2px solid var(--gold); margin: 10px 0; }

        .tab-container { display: flex; gap: 8px; margin-bottom: 4px; }
        .tab-btn { flex: 1; padding: 6px; border-radius: 20px; border: 2px solid var(--irish-green); background: white; color: var(--irish-green); font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .tab-btn.active { background: var(--irish-green); color: white; }

        #status { text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .custom-marker { font-size: 26px; text-align: center; cursor: pointer; line-height: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="title-image-container">
        <img src="./logo.png" alt="Logo" class="title-image" onclick="adminTrigger()">
    </div>

    <div class="guide-link-container">
        <a href="https://injosaka2026.my.canva.site/ifo-ar-top/" class="guide-btn" target="_blank">☘️ 遊び方ガイドを見る</a>
    </div>

    <div class="intro-text" style="text-align: center; padding: 10px; font-size: 0.9rem; line-height: 1.5; color: var(--dark-green);">
        <p style="margin: 0; font-weight: bold;">街を巡ってARスタンプを集めよう！</p>
        <p style="margin: 5px 0 0 0;">12個の中から9つのスタンプを集めると、<br>
            最終ポイントのロックが解除。<br>
            虹の麓に隠されたゴールを目指せ！☘️</p>
    </div>
    
    <div id="map"></div>
    <div id="status">スタンプを集めよう！</div>
    <button class="check-btn" onclick="checkLocation()">現在地でスタンプ！</button>

    <div class="stamp-grid" id="stamp-grid-main"></div>
    <div class="goal-container" id="goal-area"></div>

    <div id="admin-panel">
        <strong>🔧 管理者モード</strong><br>
        <div id="current-gps-info" style="margin-bottom:10px;">GPS取得中...</div>
        <div id="admin-list-container"></div>
        <button class="admin-btn" style="background:var(--irish-green); width:100%; margin-top:15px; font-size:12px;" onclick="exportSettings()">✅ 設定を書き出し (シリアル化)</button>
        <textarea id="export-area" class="export-area"></textarea>
        <button class="admin-btn" style="background:#444; width:100%; margin-top:10px;" onclick="location.reload()">🔄 画面を更新して反映</button>
        <button class="admin-btn" style="background:#a22; width:100%; margin-top:20px;" onclick="resetAdminCoords()">全データ完全初期化</button>
    </div>
</div>

<div class="refresh-ui-btn" onclick="location.reload()">🔄</div>

<div id="infoModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="margin-top:0;"></h2>
        <div class="tab-container" id="modal-tabs">
            <button class="tab-btn active" id="tab-local"   onclick="switchTab('local')">📍 現地</button>
            <button class="tab-btn"        id="tab-ireland" onclick="switchTab('ireland')">🍀 アイルランド</button>
        </div>
        <img id="modalImg" class="modal-image" src="">
        <img id="modalImgIreland" class="modal-image" src="" style="display:none;">
        <div id="modalBody"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // GPS判定距離（km）50m = 0.05
    const GPS_RADIUS_KM = 0.05;

    let targets = {
        "1": {
            name: "三つ葉の広場<br>(THE BLARNEY STONE)",
            locations: [
                { lat: 34.7006,    lng: 135.4942 },   // KITTE大阪
                { lat: 34.7010,    lng: 135.5005 },   // お初天神
                { lat: 34.6735,    lng: 135.5015 }    // 心斎橋
            ],
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot1.png", imgIreland: "",
            description: `<b>【シャムロック】</b><br>
                三つ葉のクローバーはアイルランドの国花。聖パトリックがキリスト教を広める際、この葉を使って説明したと言われています。
                <br><small>THE BLARNEY STONE<br>
                （KITTE/お初天神/心斎橋）３つどこの店舗でも取得できます</small>`
        },
        "2": {
            name: "ダブリンの扉<br>(Dublin Bay)",
            lat: 34.6688496, lng: 135.4998615,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot2.png", imgIreland: "",
            description: `<b>【カラフルなドア】</b><br>
                18世紀から続くダブリンの伝統。隣の家と同じ色にならないように鮮やかに塗られました。
                <br><small>Dublin Bay<br>
                ※営業時間（17:00〜24:00頃）営業時間外も外から取得できます</small>`
        },
        "3": {
            name: "リバーダンスの舞台<br>(なんばグランド花月)",
            lat: 34.6649869, lng: 135.5036556,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot3.png", imgIreland: "",
            description: `<b>【リバーダンス】</b><br>
                1994年のユーロビジョン・ソング・コンテストで世界を驚かせたアイルランドの伝統舞踊ショー。
                力強いタップと躍動するダンサーたちは、まさにエンターテインメントの極致。
                この舞台にもそのエネルギーが宿ります。
                <br><small>※建物外から取得可能です</small>`
        },
        "4": {
            name: "吟遊詩人の竪琴<br>(法善寺横丁)",
            lat: 34.6675, lng: 135.5025,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot4.png", imgIreland: "",
            description: `<b>【アイリッシュ・ハープ】</b><br>
                アイルランドの国章にもなっているハープ。国の魂として愛されています。
                石畳の路地に響くハープの音色。国の魂として愛される楽器です。
                <br><small>※参拝可能時間にお越しください</small>`
        },
        "5": {
            name: "巨人の道<br>(大阪松竹座)",
            lat: 34.6685, lng: 135.5015,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot5.png", imgIreland: "",
            description: `<b>【ジャイアンツ・コーズウェー】</b><br>
                火山活動でできた不思議な六角形の石柱群。巨人が作ったという伝説があります。
                世界遺産の奇岩を思わせる石柱。巨人の伝説が息づく場所です。
                <br><small>※建物周辺は24時間訪問可能です</small>`
        },
        "6": {
            name: "ケルトの結び目<br>(中之島公会堂)",
            lat: 34.6935, lng: 135.5035,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot6.png", imgIreland: "",
            description: `<b>【永遠のシンボル】</b><br>
                一筆書きのように途切れない模様は「永遠」を象徴しています。
                <br><small>※外観見学は自由ですが、夜間は足元にご注意ください</small>`
        },
        "7": {
            name: "黄金の輪<br>(知恩院・マグナス前)",
            lat: 35.0048, lng: 135.7821,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot7.png", imgIreland: "",
            description: `<b>【マグナス・リン】</b><br>
                アイルランドと日本をつなぐ黄金の輪。ゲール語で「場所・地点」を意味する「リン」は、
                日本語の「輪」にも通じます。人と自然の循環を象徴するこの作品は、
                アイルランドから遥々この地へ。
                <br><small>※開門時間（9:00〜16:00頃）にお越しください</small>`
        },
        "8": {
            name: "スロンチャ！の鐘<br>(神戸・メリケン広場)",
            lat: 34.6822937, lng: 135.1886448,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot8.png", imgIreland: "",
            description: `<b>【パブの文化】</b><br>
                「Sláinte（スロンチャ）」とは「あなたの健康に！」という意味の乾杯の言葉です。
                港町の風に乗って、乾杯の声が響きます。
                <br><small>※公園エリアのため24時間訪問可能です</small>`
        },
        "9": {
            name: "守護聖人の書<br>(カトリック神戸中央教会)",
            lat: 34.6973653, lng: 135.1904805,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot9.png", imgIreland: "",
            description: `<b>【ケルズの書】</b><br>
                世界で最も美しい本と呼ばれる、中世の豪華な写本です。
                神聖な場所に届いた異国の芸術を想います。
                <br><small>※開館時間（9:00〜17:00）にお越しください</small>`
        },
        "10": {
            name: "聖なる泉<br>(梅田スカイビル・中自然の森)",
            lat: 34.7052872, lng: 135.4896527,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot10.png", imgIreland: "",
            description: `<b>【ホーリー・ウェル】</b><br>
                アイルランド各地にある、癒やしの力があると信じられている聖なる泉。
                都会の中に湧く緑と水。その静けさに祈りを重ねて。
                <br><small>※24時間訪問可能です</small>`
        },
        "11": {
            name: "緑の谷<br>(御堂会館)",
            lat: 34.6805, lng: 135.4995,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot11.png", imgIreland: "",
            description: `<b>【グレン】</b><br>
                エメラルドの島と呼ばれるにふさわしい、美しい谷の風景。
                重厚な建物の静寂は、深く穏やかな谷（グレン）のよう。
                <br><small>※建物周辺の見学は自由です</small>`
        },
        "12": {
            name: "風の砦<br>大阪ステーションシティ　風の広場)",
            lat: 34.7030158, lng: 135.4954248,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./spot12.png", imgIreland: "",
            description: `<b>【断崖の砦】</b><br>
                断崖絶壁に建つ石造りの砦。古代の歴史を今に伝えています。
                吹き抜ける風とビル群。その迫力は砦のようです。
                <br><small>※開放時間（7:00〜23:30）にお越しください</small>`
        },
        "13": {
            name: "🌈 虹の麓の黄金<br>(太左衛門橋・GOAL)",
            lat: 34.6690596, lng: 135.5032575,
            arUrl: "https://palanar.app/v2/ar_contents/ifo2026_2",
            imgUrl: "./goal.png", imgIreland: "",
            description: `<b>【コンプリート！】</b><br>
                9つの知恵を集めました！虹の麓に隠された黄金を手にする資格は、
                あなたの好奇心そのものです。おめでとう！
                <br><small>※9スタンプ取得後に解放されます</small>`
        }
    };

    let map, markers = {}, userMarker = null;
    const storageKey = 'rally_v2026_final';
    const GOAL_ID = "13";
    const REQUIRED_COUNT = 9;
    let tapCount = 0;
    let currentLat, currentLng;

    function applyAdminOffsets() {
        const customCoords = JSON.parse(localStorage.getItem('admin_coords')) || {};
        for (let id in customCoords) {
            if (targets[id]) {
                if (customCoords[id].locations) targets[id].locations = customCoords[id].locations;
                else { targets[id].lat = customCoords[id].lat; targets[id].lng = customCoords[id].lng; }
            }
        }
    }

    function init() {
        applyAdminOffsets();
        const gridMain = document.getElementById('stamp-grid-main');
        const goalArea = document.getElementById('goal-area');
        const adminContainer = document.getElementById('admin-list-container');
        
        for (let i = 1; i <= 13; i++) {
            const id = String(i);
            const div = document.createElement('div');
            div.id = `stamp-${id}`;
            if (id === GOAL_ID) {
                div.className = 'stamp goal';
                div.innerHTML = `<span id="goal-name">🔒 9つのスタンプを集めて</span><div id="goal-btns" style="display:none;"><div class="btn-ui detail-btn" onclick="openModal('${id}')">🔍 解説</div><a href="#" class="btn-ui ar-btn" id="ar-link-${id}" target="_blank">☘️ AR</a></div>`;
                goalArea.appendChild(div);
            } else {
                div.className = `stamp stamp-color-${id}`;
                div.style.background = 'white'; // 未取得時は白
                div.innerHTML = `<span>${targets[id].name}</span><div class="btn-ui detail-btn" onclick="openModal('${id}')">🔍 解説</div><a href="#" id="ar-link-${id}" class="btn-ui ar-btn" target="_blank">☘️ AR</a>`;
                gridMain.appendChild(div);
            }

            const row = document.createElement('div');
            row.className = 'admin-row';
            row.innerHTML = `<div>[${id}] ${targets[id].name}</div>`;
            const group = document.createElement('div');
            group.className = 'admin-btn-group';

            if (id === "1") {
                ["A", "B", "C"].forEach((label, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'admin-btn';
                    btn.innerText = `登録-${label}`;
                    btn.onclick = () => saveLoc('1', idx);
                    group.appendChild(btn);
                });
            } else {
                const btn = document.createElement('button');
                btn.className = 'admin-btn';
                btn.innerText = `現在地を登録`;
                btn.onclick = () => saveLoc(id);
                group.appendChild(btn);
            }
            const acquireBtn = document.createElement('button');
            acquireBtn.className = 'admin-btn acquire-item-btn';
            acquireBtn.innerText = '取得済み';
            acquireBtn.onclick = () => acquireSingleStamp(id);
            group.appendChild(acquireBtn);

            const resetBtn = document.createElement('button');
            resetBtn.className = 'admin-btn reset-item-btn';
            resetBtn.innerText = '解除';
            resetBtn.onclick = () => resetSingleStamp(id);
            group.appendChild(resetBtn);
            row.appendChild(group);
            adminContainer.appendChild(row);
        }
        
        const center = targets["1"].locations[0];
        map = L.map('map').setView([center.lat, center.lng], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // マーカー配置も数字順で統一
        for (let i = 1; i <= 13; i++) {
            const id = String(i);
            markers[id] = [];
            const t = targets[id];
            const popupContent = `<strong>${t.name}</strong><br><button onclick="openModal('${id}')" style="margin-top:5px;font-size:10px;cursor:pointer;">解説を見る</button>`;
            
            if (t.locations) {
                t.locations.forEach(loc => {
                    const m = L.marker([loc.lat, loc.lng], {icon: L.divIcon({className:'custom-marker', html:'📍', iconSize:[30,30]})}).addTo(map).bindPopup(popupContent);
                    markers[id].push(m);
                });
            } else {
                const m = L.marker([t.lat, t.lng], {icon: L.divIcon({className:'custom-marker', html:(id==GOAL_ID?'🔒':'📍'), iconSize:[30,30]})}).addTo(map).bindPopup(popupContent);
                markers[id].push(m);
            }
        }
        updateDisplay();
        startGps();
    }

    function startGps() {
        const opt = { enableHighAccuracy: true, timeout: 10000, maximumAge: 3000 };
        navigator.geolocation.watchPosition(
            pos => {
                currentLat = pos.coords.latitude;
                currentLng = pos.coords.longitude;
                document.getElementById('current-gps-info').innerText = `現在地: ${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;

                // 現在地マーカーを更新（初回は作成、2回目以降は移動）
                if (userMarker) {
                    userMarker.setLatLng([currentLat, currentLng]);
                } else {
                    userMarker = L.marker([currentLat, currentLng], {
                        icon: L.divIcon({
                            className: 'custom-marker',
                            html: '📱',
                            iconSize: [30, 30]
                        }),
                        zIndexOffset: 1000
                    }).addTo(map).bindPopup('現在地');
                }
            },
            err => {
                document.getElementById('current-gps-info').innerText = `GPS取得失敗: ${err.message}`;
            },
            opt
        );
    }

    function checkLocation() {
        if (!currentLat) { alert("GPSを取得中です。少し待ってからもう一度お試しください。"); return; }
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        const mainCount = stamps.filter(id => id != GOAL_ID).length;
        let foundId = null;

        // 数字順で判定（for...inのランダム順バグを修正）
        for (let i = 1; i <= 13; i++) {
            const id = String(i);
            const t = targets[id];
            const dist = t.locations
                ? Math.min(...t.locations.map(l => getDist(currentLat, currentLng, l.lat, l.lng)))
                : getDist(currentLat, currentLng, t.lat, t.lng);

            if (dist < GPS_RADIUS_KM) {
                if (id == GOAL_ID && mainCount < REQUIRED_COUNT) {
                    alert("まだゴールは開いていません！"); return;
                }
                foundId = id; break;
            }
        }

        if (foundId) {
            if (!stamps.includes(foundId)) {
                stamps.push(foundId);
                localStorage.setItem(storageKey, JSON.stringify(stamps));
                updateDisplay();
                alert("☘️ おめでとう！スタンプをゲット！");
            } else {
                alert("このスポットは獲得済みです！");
            }
        } else {
            alert("近くにスポットがありません。");
        }
    }

    function updateDisplay() {
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        const mainCount = stamps.filter(id => id != GOAL_ID).length;
        
        // 全スタンプをリセット（未取得→白背景）
        for (let i = 1; i <= 13; i++) {
            const el = document.getElementById("stamp-" + i);
            el?.classList.remove("active");
            if (el && i < 13) el.style.background = 'white';
            const ar = document.getElementById("ar-link-" + i);
            if (ar) ar.style.display = "none";
        }

        // 取得済みスタンプに虹色を適用
        stamps.forEach(id => {
            const el = document.getElementById("stamp-" + id);
            el?.classList.add("active");
            if (el && id != GOAL_ID) el.style.background = ''; // CSSクラスの色を有効化
            const ar = document.getElementById("ar-link-" + id);
            if (ar) { ar.href = targets[id].arUrl; ar.style.display = "block"; }
            markers[id].forEach(m => m.setIcon(L.divIcon({className:'custom-marker', html:(id==GOAL_ID?'🌈':'☘️'), iconSize:[30,30]})));
        });

        if (mainCount >= REQUIRED_COUNT) {
            const goalEl = document.getElementById("stamp-" + GOAL_ID);
            goalEl.classList.add("ready");
            document.getElementById("goal-name").innerHTML = targets[GOAL_ID].name;
            document.getElementById("goal-btns").style.display = "block";
            if (!stamps.includes(GOAL_ID)) {
                markers[GOAL_ID].forEach(m => m.setIcon(L.divIcon({className:'custom-marker', html:'📍', iconSize:[30,30]})));
            }
        } else {
            document.getElementById("stamp-" + GOAL_ID).classList.remove("ready");
            document.getElementById("goal-name").innerText = "🔒 9つのスタンプを集めて";
            document.getElementById("goal-btns").style.display = "none";
            markers[GOAL_ID].forEach(m => m.setIcon(L.divIcon({className:'custom-marker', html:'🔒', iconSize:[30,30]})));
        }
        document.getElementById("status").innerText = `集めたスタンプ: ${mainCount} / ${REQUIRED_COUNT}`;
    }

    function saveLoc(id, idx = null) {
        if (!currentLat) return;
        const c = JSON.parse(localStorage.getItem('admin_coords')) || {};
        if (idx !== null) {
            if (!c[id]) c[id] = { locations: [...targets[id].locations] };
            c[id].locations[idx] = { lat: currentLat, lng: currentLng };
        } else {
            c[id] = { lat: currentLat, lng: currentLng };
        }
        localStorage.setItem('admin_coords', JSON.stringify(c));
        alert(`${targets[id].name} を現在の座標で登録しました。画面を更新して反映してください。`);
    }

    function acquireSingleStamp(id) {
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        if (!stamps.includes(id)) {
            stamps.push(id);
            localStorage.setItem(storageKey, JSON.stringify(stamps));
            updateDisplay();
            alert(targets[id].name + ' を取得済みにしました。');
        } else {
            alert('すでに取得済みです。');
        }
    }

    function resetSingleStamp(id) {
        let stamps = JSON.parse(localStorage.getItem(storageKey)) || [];
        const index = stamps.indexOf(id);
        if (index > -1) {
            stamps.splice(index, 1);
            localStorage.setItem(storageKey, JSON.stringify(stamps));
            updateDisplay();
            alert(`${targets[id].name} の獲得状況をリセットしました。`);
        }
    }

    function exportSettings() {
        applyAdminOffsets();
        const area = document.getElementById('export-area');
        area.style.display = 'block';
        area.value = JSON.stringify(targets, null, 4);
        area.select();
        navigator.clipboard.writeText(area.value).catch(() => document.execCommand('copy'));
        alert("設定をクリップボードにコピーしました。");
    }

    function adminTrigger() { if (++tapCount >= 5) { document.getElementById('admin-panel').style.display = 'block'; tapCount = 0; } }
    function resetAdminCoords() { if (confirm("全て初期化しますか？")) { localStorage.clear(); location.reload(); } }

    function openModal(id) {
        document.getElementById('modalTitle').innerHTML = targets[id].name;
        document.getElementById('modalImg').src = targets[id].imgUrl;
        document.getElementById('modalBody').innerHTML = targets[id].description;
        const hasIreland = targets[id].imgIreland && targets[id].imgIreland !== "";
        document.getElementById('modal-tabs').style.display = hasIreland ? 'flex' : 'none';
        document.getElementById('modalImgIreland').src = hasIreland ? targets[id].imgIreland : '';
        switchTab('local');
        document.getElementById('infoModal').style.display = 'flex';
    }

    function switchTab(tab) {
        const isLocal = tab === 'local';
        document.getElementById('modalImg').style.display        = isLocal ? 'block' : 'none';
        document.getElementById('modalImgIreland').style.display = isLocal ? 'none'  : 'block';
        document.getElementById('tab-local').classList.toggle('active',  isLocal);
        document.getElementById('tab-ireland').classList.toggle('active', !isLocal);
    }

    function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
    function getDist(lat1,lng1,lat2,lng2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
    window.onload = init;
</script>
